        <nav class="nav">

        <div class="main-content">
            <div class="page-header">
                <h2>Xodimlar va Rollar</h2>
            </div>
            <div class="form-card" id="user-form">
                <h3>Yangi xodim qo'shish</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="user-name">F.I.SH</label>
                        <input type="text" id="user-name" placeholder="Masalan: Behruz">
                    </div>
                    <div class="form-group">
                        <label for="user-phone">Email</label>
                        <input type="text" id="user-email" placeholder="exapmle@gmail.com">
                    </div>
                    <div class="form-group">
                        <label for="user-phone">Passwod</label>
                        <input type="text" id="user-password">
                    </div>
                    <div class="form-group">
                        <label for="user-role">Roli</label>
                        <select id="user-role">
                            <option value="admin">Admin</option>
                            <option value="skladchi">Omborchi (Skladchi)</option>
                            <option value="menejer">Menejer</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-secondary" id="cancel-user-btn">Bekor qilish</button>
                    <button class="btn-primary" id="save-user-btn" onclick="addUser()">Saqlash</button>
                </div>
            </div>
            <div class="users-grid"></div>
        </div>
